        }
      },
      {
        "@type": "Question",
        "name": "Hvad er fripladstilskud, og hvem kan få det?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Fripladstilskud er en rabat på forældrebetalingen for dagtilbud. Tilskuddet afhænger af husstandsindkomsten. Familier med en indkomst under 677.500 kr. kan få delvist tilskud, og under 218.100 kr. får man fuld friplads."
        }
      },
      {
        "@type": "Question",
        "name": "Hvad er forskellen på dagpleje og vuggestue?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Dagpleje foregår i en dagplejers private hjem med maks 4-5 børn, mens en vuggestue er en institution med flere børn og personale. Dagpleje er ofte billigere, mens vuggestuer typisk har flere pædagoger og faciliteter."
        }
      },
      {
        "@type": "Question",
        "name": "Hvordan finder jeg den bedste skole til mit barn?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Institutionsguide viser kvalitetsdata for alle folkeskoler og friskoler i Danmark, herunder trivsel, karaktergennemsnit, fravær og kompetencedækning. Du kan sammenligne skoler side om side for at finde den bedste skole i dit område."
        }
      },
      {
        "@type": "Question",
        "name": "Hvor mange institutioner er der i Danmark?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Danmark har over 5.000 daginstitutioner, dagplejere og skoler fordelt på alle 98 kommuner. Det inkluderer vuggestuer, børnehaver, dagplejere, folkeskoler, friskoler og SFO-tilbud."
        }
